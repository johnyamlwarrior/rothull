- type: entity
  id: HullrotLowYieldRock
  parent: BaseDebrisNF
  name: Low Yield Rock
  abstract: true
  components:
    - type: MapGrid
    - type: BlobFloorPlanBuilder
      floorTileset:
      - FloorAsteroidSand
      blobDrawProb: 0.5
      radius: 6
      floorPlacements: 16
    - type: SimpleFloorPlanPopulator
      entries:
        FloorAsteroidSand:
          - id: RandomArtifactSpawner20
            prob: 0.001
            orGroup: rock
          - id: WallRock
            prob: 0.2
            orGroup: rock
          - id: WallRockCoal
            prob: 0.01
            orGroup: rock
          - id: WallRockTin
            prob: 0.2
            orGroup: rock
          - id: WallRockQuartz
            prob: 0.04
            orGroup: rock
          - id: WallRockCopper
            prob: 0.06
            orGroup: rock
          - id: AsteroidRockAluminium
            prob: 0.06
            orGroup: rock
          - id: AsteroidRockLead
            prob: 0.06
            orGroup: rock
    - type: IFF
      flags: HideLabel
      color: "#d67e27"

