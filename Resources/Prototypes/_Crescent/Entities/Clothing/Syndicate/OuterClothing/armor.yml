- type: entity
  parent: [ClothingOuterHardsuitBase, ClothingArmorInsertHardsuit]
  id: ClothingOuterHardsuitRamzi
  name: LUGNUT mk.I combat technician's hardsuit
  description: A modular hardsuit, bears the colors of the Shipfitters and Astronautics Workers Union of the Syndicate.
  components:
  - type: Sprite
    sprite: _Crescent/Clothing/Syndicate/OuterClothing/syndicateramzi.rsi
  - type: Clothing
    sprite: _Crescent/Clothing/Syndicate/OuterClothing/syndicateramzi.rsi
  - type: ExtendDescription
    descriptionList:
      - description: This is a carrier vest, it will only provide mediocre protection on its own. Put an armor insert into it to fully utilize it.
        fontSize: 15
        color: "#ff2106"
        requireDetailRange: true
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.3
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Heat: 0.55
        Cold: 0.55
        Caustic: 0.55
        Radiation: 0.35
  - type: ClothingSpeedModifier
    walkModifier: 0.97
    sprintModifier: 0.97
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitRamzi
  - type: StaticPrice
    price: 1000
  - type: Contraband
    value: 8
  - type: ClothingAddFaction
    faction: TFSC
  - type: ReverseEngineering # Sector Crescent
    recipes:
      - ClothingOuterHardsuitRamzi

