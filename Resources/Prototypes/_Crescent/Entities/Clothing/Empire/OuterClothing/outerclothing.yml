#hardsuits

- type: entity
  parent: ClothingOuterHardsuitBase
  id: ClothingOuterHardsuitImperialWorker
  name: CEVAS Worker's Hardsuit
  description: The Citizen EVA System (CEVAS) is the standard hardsuit provided to Imperial colonies and civilian fleets for EVA operations. Doesn't protect the wearer from much, but the suit is quite comfortable, and the purple makes you feel rich.
  components:
  - type: Sprite
    sprite: _Crescent/Clothing/Empire/OuterClothing/mandateworker.rsi
  - type: Clothing
    sprite: _Crescent/Clothing/Empire/OuterClothing/mandateworker.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.6
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.90
        Slash: 0.90
        Heat: 0.6
        Cold: 0.6
        Caustic: 0.6
        Radiation: 0.4
  - type: ClothingSpeedModifier
    walkModifier: 0.97
    sprintModifier: 0.97
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitImperialWorker
  - type: StaticPrice
    price: 2500
  - type: ClothingAddFaction
    faction: DSM
  - type: ReverseEngineering # Sector Crescent
    recipes:
      - ClothingOuterHardsuitImperialWorker
      # - ClothingOuterHardsuitClarizianWorker

