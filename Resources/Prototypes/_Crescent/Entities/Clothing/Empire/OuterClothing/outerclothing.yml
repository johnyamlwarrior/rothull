- type: entity
  parent: [ClothingOuterHardsuitBase, EnergyShieldClothingEmpire, StreeCredRedeemable, ClothingArmorInsertHardsuitJugg]
  id: ClothingOuterHardsuitImperialJuggernaut
  name: ESACH 'VALKYRE' Combat Hardsuit #Damn you SHI for taking Gilgamesh
  description: The Energetically Shielded Advanced Combat Hardsuit is an incredibly sophisticated combat suit, designed just before the Bluespace Collapse. The ESACH allows for a full sized plate to be inserted, and also comes equipped with a personal deflection matrix. This suit is worth its weight in gold.
  components:
  - type: Sprite
    sprite: _Crescent/Clothing/Empire/OuterClothing/mandatejuggernaut.rsi
  - type: Clothing
    sprite: _Crescent/Clothing/Empire/OuterClothing/mandatejuggernaut.rsi
  - type: ExtendDescription
    descriptionList:
      - description: This is a carrier vest, it will only provide mediocre protection on its own. Put an armor insert into it to fully utilize it.
        fontSize: 15
        color: "#ff2106"
        requireDetailRange: true
  - type: PressureProtection
    highPressureMultiplier: 0.02
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.4
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Heat: 0.75
        Cold: 0.75
        Caustic: 0.75
  - type: ClothingSpeedModifier #mildly better than other jugsuits, but far worse protection than a T2
    walkModifier: 0.6
    sprintModifier: 0.6
  - type: HeldSpeedModifier
  - type: Reflect
    spread: 270
    reflectProb: 0.05
    innate: true
    reflects:
      - Energy
      - NonEnergy
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitImperialJuggernaut
  - type: StaticPrice
    price: 9000
  - type: ClothingAddFaction
    faction: DSM
  - type: ReverseEngineering # Sector Crescent
    difficulty: 5
    recipes:
      - ClothingOuterHardsuitImperialKnight
      - ClothingOuterHardsuitImperialSoldier
      - ClothingOuterHardsuitImperialWorker
      - ClothingOuterHardsuitImperialJuggernaut

