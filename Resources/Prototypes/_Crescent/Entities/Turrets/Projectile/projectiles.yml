- type: entity
  id: Bullet15mmBase
  name: 15mm FMJ projectile
  description: That's not good...
  parent: BaseBulletTrigger
  categories: [ HideSpawnMenu ]
  components:
  - type: ProjectilePhasePrevent
    mask:
    - Impassable
    - BulletImpassable
  - type: ProjectileIFF
    visualType: Circle
    color: White
  - type: Projectile
    ignoreWeaponGrid: true
    damage:
      types:
        Structural: 5
        Piercing: 50
  - type: PointLight
    radius: 3.5
    color: orange
    energy: 0.5
  - type: TimedDespawn
    lifetime: 2.33
  - type: Sprite
    sprite: _NF/Objects/SpaceArtillery/pdtcasing.rsi
    layers:
      - state: base-projectile
  - type: ShipWeaponProjectile

