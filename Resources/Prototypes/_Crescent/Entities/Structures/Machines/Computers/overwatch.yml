- type: entity
  parent: BaseComputer
  abstract: true
  id: BaseComputerOverwatch
  name: overwatch console
  description: A computer console used to track faction members via wearable cameras.
  placement:
    mode: SnapgridCenter
  components:
  # - type: Computer
  #   board: OverwatchComputerCircuitboard
  - type: ApcPowerReceiver
    powerLoad: 200
  - type: ExtensionCableReceiver
  - type: ActivatableUIRequiresPower
  - type: ActivatableUI
    singleUser: true
    key: enum.OverwatchUiKey.Key
  - type: Sprite
    sprite: Structures/Machines/computers.rsi
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: generic
    - map: ["computerLayerKeys"]
      state: generic_keys
    - map: ["enum.WiresVisualLayers.MaintenancePanel"]
      state: generic_panel_open
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ComputerVisuals.Powered:
        computerLayerScreen:
          True: { visible: true, shader: unshaded }
          False: { visible: false }
        computerLayerKeys:
          True: { visible: true, shader: unshaded }
          False: { visible: true, shader: shaded }
      enum.WiresVisuals.MaintenancePanelState:
        enum.WiresVisualLayers.MaintenancePanel:
          True: { visible: false }
          False: { visible: true }
  - type: LitOnPowered
  - type: PointLight
    radius: 1.5
    energy: 1.6
    enabled: false
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    offset: "0, 0.4"
    castShadows: false
  - type: SpamEmitSoundRequirePower
  - type: SpamEmitSound
    minInterval: 20
    maxInterval: 60
    sound:
      collection: ComputerSFX
      params:
        volume: -3
        maxDistance: 5
        variation: 0.15
  - type: AmbientOnPowered
  - type: AmbientSound
    sound:
      path: /Audio/_Crescent/Ambience/computer_loop.ogg
      params:
        volume: -12
        maxDistance: 5
  - type: EmitSoundOnUIOpen
    sound:
      path: /Audio/_Crescent/Ambience/Computers/type.ogg
      params:
        volume: -1
        variation: 0.10
        pitch: 1.10
    blacklist:
      tags:
      - NoConsoleSound
  - type: ContainerContainer
    containers:
      board: !type:Container
        ents: []
  - type: LightningTarget
    priority: 1
  - type: RequireProjectileTarget
  - type: LanguageSpeaker
    currentLanguage: TauCetiBasic
  - type: LanguageKnowledge
    speaks:
    - TauCetiBasic
    - RobotTalk
    understands:
    - TauCetiBasic
    - RobotTalk
  - type: Electrified
    enabled: false
    usesApcPower: true
  - type: WiresPanel
  - type: WiresVisuals
  - type: Wires
    boardName: wires-board-name-computer
    layoutId: Computer
  - type: UserInterface
    interfaces:
      enum.OverwatchUiKey.Key:
        type: Content.Client._Rat.Overwatch.OverwatchBoundUserInterface
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface
  - type: OverwatchConsole
  - type: StationAiWhitelist

